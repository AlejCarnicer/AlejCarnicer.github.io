<div class="team-card">
  <div class="team-photo-wrap">
    <img class="team-photo" src="{{ member.photo | relative_url }}" alt="{{ member.name }}">
  </div>

  <div>
    <h3 class="team-name">{{ member.name }}</h3>
    <p class="team-title">{{ member.title }}</p>
    <p class="team-bio">{{ member.bio }}</p>

    <div class="team-links">
      {% if member.links.email %}
        <a href="mailto:{{ member.links.email }}" aria-label="Email {{ member.name }}">
          <i class="fas fa-envelope"></i>
          <span class="sr-only">Email</span>
        </a>
      {% endif %}

      {% if member.links.github %}
        <a href="{{ member.links.github }}" target="_blank" rel="noopener" aria-label="GitHub {{ member.name }}">
          <i class="fab fa-github"></i>
          <span class="sr-only">GitHub</span>
        </a>
      {% endif %}

      {% if member.links.orcid %}
        <a href="{{ member.links.orcid }}" target="_blank" rel="noopener" aria-label="ORCID {{ member.name }}">
          <i class="ai ai-orcid"></i>
          <span class="sr-only">ORCID</span>
        </a>
      {% endif %}

      {% if member.links.scholar %}
        <a href="{{ member.links.scholar }}" target="_blank" rel="noopener" aria-label="Google Scholar {{ member.name }}">
          <i class="ai ai-google-scholar"></i>
          <span class="sr-only">Google Scholar</span>
        </a>
      {% endif %}
    </div>
  </div>
</div>
